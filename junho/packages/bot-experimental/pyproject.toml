[project]
name = "holdem-bot-experimental"
version = "0.1.0"
description = "Experimental 봇 스캐폴드 — 현재는 BalancedStrategy 재사용. 실제 전략은 TBD (ML/RL 실험 슬롯)."
requires-python = ">=3.12"
dependencies = [
    "holdem-core",
    "holdem-main-bot",
]

[tool.uv.sources]
holdem-core = { workspace = true }
holdem-main-bot = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/holdem_bot_experimental"]
