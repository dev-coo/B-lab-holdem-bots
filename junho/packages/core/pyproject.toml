[project]
name = "holdem-core"
version = "0.2.0"
description = "Holdem 봇 공용 기반 — WS 프로토콜, 관측 인프라, FastAPI 앱 팩토리, 순수 포커 유틸"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.32",
    "pydantic-settings>=2.6",
    "websockets>=13",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/holdem_core"]
