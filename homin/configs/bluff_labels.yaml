# Bluff vs Value 라벨링 경계.
# 근거: research/dataset_analysis/eda_05_bluff_threshold.md §4 (2.06M hands, MC=120).
# BOT_GUIDE §3 카드 표기, §5.6 showdown (폴드자 카드 X), §6.2 raise amount 준수.

version: 0.2
stage: draft
source: "eda_05_bluff_threshold.md v0.2 (full 2,059,400 hands / 4,298,389 records, MC=120)"

# Pairwise true equity 기준 경계
# Turn 의 히스토그램 valley (eq 0.35~0.55) 에서 경계 직접 도출.
theta:
  flop:
    bluff: 0.30      # eq < 0.30 → bluff 라벨
    value: 0.65      # eq > 0.65 → value 라벨
    mixed_range: [0.30, 0.65]
  turn:
    bluff: 0.35
    value: 0.60
    mixed_range: [0.35, 0.60]
  river:
    # pairwise 0/0.5/1 → range-vs-range 재평가 대기 (D5)
    bluff: null
    value: null
    mixed_range: null

# Street 별 신호 가중치 (label 신뢰도)
street_weights:
  flop:  0.8
  turn:  1.3
  river: 1.5   # range-vs-range 적용 후 유효

# 연속 블러핑 가중치 (세미블러핑 부드러운 매핑)
# bluff_weight(eq) = clip((cutoff - eq) / width, 0, 1)
continuous_weight:
  flop:
    cutoff: 0.55
    width:  0.25
  turn:
    cutoff: 0.55
    width:  0.20
  river:
    cutoff: null
    width:  null

# Sizing 별 bluff rate 관측값 (eq < 0.4 기준) — 참조만. 주 분류는 equity.
observed_sizing_bluff_rate:
  tiny_lt_0.33:       0.453
  half_0.33_0.55:     0.409
  two_thirds_0.55_0.85: 0.426
  pot_0.85_1.25:      0.414
  overbet_1.25_2.0:   0.395
  huge_ge_2.0:        0.468

# Pure air (epsilon equity) 판정
pure_air_threshold: 0.05

# 실서버 적용 시 플래그
use_range_vs_range: false
# True 로 전환 시 equity 는 villain 추정 range 기반 기대값으로 재계산 (D5 단계)

# 샘플 통계
sample_stats:
  n_hands_scanned:      2059400
  n_decisions_total:    4298389
  n_decisions_with_eq:  2058482   # 프리플롭 제외
  n_by_street:
    flop:  1174956
    turn:   605340
    river:  278186
  mc_samples_used: 120

# 핵심 발견 요약
findings:
  turn_bimodal:   true         # valley 뚜렷
  flop_bimodal:   true         # softer valley
  river_binary:   true         # pairwise 한계
  sizing_signal:  weak         # U-shape, 39~47% 변동
  llm_bluff_rate: elevated     # river 43.6% 는 인간 풀 대비 높음
