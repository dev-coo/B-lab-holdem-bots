# 모드 전환 경계 (M 기준)
# Reference: bot_guide_extracts.md Note 13.1
mode_thresholds:
  deep:      {min_M: 30}
  mid:       {min_M: 15, max_M: 30}
  hybrid:    {min_M: 8,  max_M: 15}
  push_fold: {max_M: 8}

# 누적 핸드 범위 (Lv 20 제외)
cumulative_hands:
  total_to_lv19: 140
  avg_game_length_estimate: [80, 130]  # bot_guide_extracts.md Note 10.3
