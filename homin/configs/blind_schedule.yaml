  - {level: 4,  sb: 4,    bb: 8,    hands: 10}
  - {level: 5,  sb: 5,    bb: 10,   hands: 10}
  - {level: 6,  sb: 10,   bb: 20,   hands: 8}
  - {level: 7,  sb: 20,   bb: 40,   hands: 8}
  - {level: 8,  sb: 30,   bb: 60,   hands: 8}
  - {level: 9,  sb: 40,   bb: 80,   hands: 8}
  - {level: 10, sb: 50,   bb: 100,  hands: 8}
  - {level: 11, sb: 100,  bb: 200,  hands: 6}
  - {level: 12, sb: 200,  bb: 400,  hands: 6}
  - {level: 13, sb: 300,  bb: 600,  hands: 6}
  - {level: 14, sb: 400,  bb: 800,  hands: 6}
  - {level: 15, sb: 500,  bb: 1000, hands: 6}
